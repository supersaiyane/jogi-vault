<nav>
<div class="brand">
<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
style="vertical-align:middle;margin-right:.5rem;opacity:.8">
<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
<path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
Jogi <span>Vault</span></div>
<div class="nav-tabs">
<a class="nav-link{% if active_tab == 'secrets' %} active{% endif %}" href="/vault">Secrets</a>
<a class="nav-link{% if active_tab == 'backup' %} active{% endif %}" href="/backup">Backup</a>
<a class="nav-link{% if active_tab == 'api' %} active{% endif %}" href="/api-settings">API</a>
<form method="post" action="/vault/switch-ns" style="display:inline;margin-left:.6rem">
{{ csrf_field() | safe }}
<select name="ns" onchange="this.form.submit()"
style="background:var(--bg-deep);color:var(--accent-soft);border:1px solid var(--border);border-radius:8px;padding:.35rem .6rem;font-size:.8rem;font-family:inherit;font-weight:500;cursor:pointer;transition:border-color .2s">
{% for n in all_ns %}
<option value="{{ n }}"{% if n == current_ns %} selected{% endif %}>{{ n }}</option>
{% endfor %}
</select>
</form>
<a class="btn bg bs" href="/vault/new-ns"
style="font-size:.75rem;padding:.3rem .65rem;margin-left:.3rem">+ NS</a>
<a class="nav-lock" href="/logout">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
style="vertical-align:middle;margin-right:.3rem">
<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
<path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
Lock</a>
</div>
</nav>
